<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Félix IA — Fondo UNE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />

  <style>
    /* ── Variables ─────────────────────────────────── */
    :root {
      --bg:         #f4f6f9;
      --surface:    #ffffff;
      --surface-2:  #eef1f6;
      --brand:      #003087;   /* azul UNE */
      --brand-mid:  #0051cc;
      --brand-lite: #e8eef9;
      --accent:     #f5a800;   /* amarillo UNE */
      --text:       #1a1f2e;
      --text-2:     #5a6279;
      --border:     #dde2ec;
      --felix-bubble: #003087;
      --user-bubble:  #f0f4ff;
      --error:      #d94040;
      --radius:     16px;
      --shadow:     0 4px 24px rgba(0,48,135,0.08);
    }

    /* ── Reset ─────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    /* ── Layout shell ──────────────────────────────── */
    .app-wrapper {
      width: 100%;
      max-width: 820px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    /* ── Header ────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      background: var(--brand);
      color: #fff;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--brand);
      font-weight: 400;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.2);
    }

    .header-info h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    .header-info p {
      font-size: 12px;
      color: rgba(255,255,255,0.68);
      margin-top: 2px;
      font-weight: 300;
    }

    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4cde80;
      margin-right: 5px;
      vertical-align: middle;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .header-actions {
      display: flex;
      gap: 8px;
    }

    .btn-icon {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: #fff;
      cursor: pointer;
      padding: 8px 14px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .btn-icon:hover { background: rgba(255,255,255,0.22); }
    .btn-icon svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── Chat área ─────────────────────────────────── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat-messages::-webkit-scrollbar { width: 5px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    /* ── Mensajes ──────────────────────────────────── */
    .message {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      animation: fadeUp 0.22s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      flex-direction: row-reverse;
    }

    .message.felix::before {
      content: 'F';
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--brand);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-bottom: 2px;
    }

    .bubble {
      max-width: 72%;
      padding: 13px 18px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: 14.5px;
    }

    .message.felix .bubble {
      background: var(--brand-lite);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .message.user .bubble {
      background: var(--brand);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .message.error .bubble {
      background: #fff0f0;
      color: var(--error);
      border: 1px solid #ffd0d0;
    }

    .bubble strong { font-weight: 600; }
    .bubble em     { font-style: italic; }

    /* ── Typing indicator ──────────────────────────── */
    .typing-indicator .bubble {
      padding: 16px 20px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-indicator .bubble span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--brand);
      animation: bounce 1.2s infinite ease-in-out;
      opacity: 0.6;
    }

    .typing-indicator .bubble span:nth-child(2) { animation-delay: 0.18s; }
    .typing-indicator .bubble span:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40%            { transform: scale(1.1); opacity: 1;   }
    }

    /* ── Footer / Input ────────────────────────────── */
    .chat-footer {
      padding: 16px 24px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 10px 10px 10px 18px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-row:focus-within {
      border-color: var(--brand-mid);
      box-shadow: 0 0 0 3px rgba(0,81,204,0.1);
    }

    #user-input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      color: var(--text);
      resize: none;
      outline: none;
      min-height: 24px;
      max-height: 120px;
      line-height: 1.5;
    }

    #user-input::placeholder { color: var(--text-2); }

    #user-input:disabled { cursor: not-allowed; opacity: 0.5; }

    #send-btn {
      width: 42px;
      height: 42px;
      border-radius: 11px;
      background: var(--brand);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover:not(:disabled) {
      background: var(--brand-mid);
      transform: scale(1.04);
    }

    #send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    #send-btn svg { width: 18px; height: 18px; }

    /* Loading spinner en el botón */
    #send-btn.loading svg { display: none; }
    #send-btn.loading::after {
      content: '';
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .input-hint {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 8px;
      text-align: center;
    }

    /* ── Responsive ────────────────────────────────── */
    @media (max-width: 600px) {
      .header { padding: 14px 18px; }
      .header-info h1 { font-size: 17px; }
      #chat-messages { padding: 18px 14px; }
      .chat-footer { padding: 12px 14px 16px; }
      .bubble { max-width: 88%; font-size: 14px; }
      .btn-icon span { display: none; }
    }
  </style>
</head>

<body>
  <div class="app-wrapper">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header-brand">
        <div class="header-avatar">F</div>
        <div class="header-info">
          <h1>Félix</h1>
          <p><span class="status-dot"></span>Asistente Virtual · Fondo UNE</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="clear-chat" title="Nueva conversación">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
          </svg>
          <span>Nueva consulta</span>
        </button>
      </div>
    </header>

    <!-- ── Mensajes ── -->
    <div id="chat-messages" role="log" aria-live="polite" aria-label="Conversación con Félix"></div>

    <!-- ── Input ── -->
    <footer class="chat-footer">
      <div class="input-row">
        <textarea
          id="user-input"
          placeholder="Escribe tu consulta aquí…"
          rows="1"
          aria-label="Escribe tu mensaje"
          autocomplete="off"
          spellcheck="true"
        ></textarea>
        <button id="send-btn" aria-label="Enviar mensaje">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="input-hint">Presiona <strong>Enter</strong> para enviar · <strong>Shift + Enter</strong> para nueva línea</p>
    </footer>

  </div>

  <!-- ── Félix IA lógica ── -->
  <script src="felix-ia.js"></script>

  <!-- Auto-resize del textarea -->
  <script>
    const ta = document.getElementById('user-input');
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
    });
  </script>
</body>
</html>
